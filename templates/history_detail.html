<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Detail</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 2rem; background: #f4f7fb; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 28px rgba(0,0,0,0.08); }
        h1 { margin-top: 0; }
        .meta { margin-bottom: 1.5rem; }
        .meta dt { font-weight: 700; }
        .meta dd { margin: 0 0 0.75rem 0; color: #374151; }
        pre { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; overflow-x: auto; white-space: pre-wrap; word-break: break-word; color: #111827; }
        .button { display: inline-flex; align-items: center; justify-content: center; padding: 0.8rem 1.2rem; border-radius: 8px; background: #2563eb; color: white; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>History Detail</h1>
        <dl class="meta">
            <dt>Filename</dt>
            <dd>{{ entry.filename }}</dd>
            <dt>User Type</dt>
            <dd>{{ entry.user_type or 'N/A' }}</dd>
            <dt>Repository</dt>
            <dd>{{ entry.repository or 'N/A' }}</dd>
            <dt>Date</dt>
            <dd>{{ entry.date or 'N/A' }}</dd>
            <dt>Path</dt>
            <dd>{{ entry.file_path }}</dd>
        </dl>

        <h2>File Contents</h2>
        <pre>{{ contents }}</pre>

        <p><a class="button" href="{{ url_for('history') }}">Back to history</a></p>
    </div>
</body>
</html>
